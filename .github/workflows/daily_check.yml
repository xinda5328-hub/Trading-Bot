name: Daily Strategy Check

on:
  schedule:
    - cron: '0 22 * * *' # 北京时间早上6点运行
  workflow_dispatch: # 允许你手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 给仓库写入权限，用于保存 last_state.txt
     
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
         
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
         
      - name: Install dependencies
        run: pip install yfinance requests
       
      - name: Run Strategy
        run: python strategy.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
         
      - name: Commit state
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add last_state.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update state" && git push)
 
