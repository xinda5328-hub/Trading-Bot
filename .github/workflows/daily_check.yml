name: Daily Strategy Check

on:
  schedule:
    # 使用 22:00 UTC，对应北京时间 06:00
    # 增加一个 15 分钟的随机偏移 (15 22)，避开 GitHub 整点服务器负载高峰
    - cron: '15 22 * * 0-4' 
  workflow_dispatch: # 保持手动触发功能

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 给仓库写入权限，用于保存 last_state.txt
     
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
         
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
         
      - name: Install dependencies
        run: pip install yfinance requests
       
      - name: Run Strategy
        run: python strategy.py
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
         
      - name: Commit state
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add last_state.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update state" && git push)
 
